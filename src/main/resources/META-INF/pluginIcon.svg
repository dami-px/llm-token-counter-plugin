<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="1" y="1" width="38" height="38" rx="8" ry="8" fill="url(#bg)"/>
  <!-- Hash/token symbol (#) stylized as a counter -->
  <g stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Vertical bars of # -->
    <line x1="16" y1="10" x2="14" y2="30"/>
    <line x1="26" y1="10" x2="24" y2="30"/>
    <!-- Horizontal bars of # -->
    <line x1="10" y1="16" x2="30" y2="16"/>
    <line x1="10" y1="24" x2="30" y2="24"/>
  </g>
  <!-- Small token count digits -->
  <text x="33" y="12" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.85">42</text>
</svg>
